{% extends "base.html" %}

{% block title %}Register - EventSpheres{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-brand-card rounded-3xl shadow-2xl overflow-hidden border border-white/5 relative">
        <!-- Abstract Decoration -->
        <div class="absolute top-0 left-0 w-40 h-40 bg-purple-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-0 w-40 h-40 bg-brand-accent/20 rounded-full blur-3xl"></div>
        
        <div class="p-8 sm:p-10 relative z-10">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/10">
                    <i class="fa-solid fa-user-plus text-brand-accent text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-tight">Join EventSpheres</h2>
                <p class="text-brand-muted mt-2">Create your account to start exploring</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-brand-muted mb-2">Full Name</label>
                    <input id="name" name="name" type="text" required class="w-full bg-brand-bg border border-white/10 rounded-xl px-4 py-3 text-white placeholder-brand-muted/50 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-brand-muted mb-2">Email Address</label>
                    <input id="email" name="email" type="email" required class="w-full bg-brand-bg border border-white/10 rounded-xl px-4 py-3 text-white placeholder-brand-muted/50 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all">
                </div>

                <div>
                    <label for="role" class="block text-sm font-medium text-brand-muted mb-2">Role</label>
                    <div class="relative">
                        <select id="role" name="role" class="w-full bg-brand-bg border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all appearance-none cursor-pointer">
                            <option value="student">Attendee (Student/Professional)</option>
                            <option value="organizer">Event Organizer</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-brand-muted">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-brand-muted mb-2">Password</label>
                    <input id="password" name="password" type="password" required class="w-full bg-brand-bg border border-white/10 rounded-xl px-4 py-3 text-white placeholder-brand-muted/50 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 rounded-xl font-bold text-white bg-brand-accent hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-brand-card focus:ring-brand-accent transition-all shadow-lg shadow-brand-accent/20 hover:-translate-y-0.5">
                        Create Account
                    </button>
                </div>
            </form>
            
            <div class="mt-8 text-center border-t border-white/10 pt-6">
                <p class="text-sm text-brand-muted">
                    Already have an account? 
                    <a href="{{ url_for('auth.login') }}" class="font-bold text-white hover:text-brand-accent transition-colors ml-1">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
