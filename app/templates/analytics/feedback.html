{% extends "base.html" %}

{% block title %}Feedback - {{ event.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-brand-card shadow-2xl rounded-3xl overflow-hidden border border-white/5 relative">
        <div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-br from-brand-accent to-purple-600"></div>
        
        <div class="p-8 sm:p-10 relative z-10 mt-16">
            <div class="bg-brand-bg w-24 h-24 rounded-3xl border-4 border-brand-card flex items-center justify-center shadow-xl absolute -top-28 left-8">
                <i class="fa-solid fa-star text-4xl text-yellow-400"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">Event Feedback</h1>
            <p class="text-brand-muted mb-8">How was your experience at <span class="text-white font-medium">{{ event.title }}</span>?</p>
            
            <form action="{{ url_for('analytics.submit_feedback', event_id=event.id) }}" method="POST">
                <div class="space-y-8">
                    <!-- Star Rating -->
                    <div class="bg-brand-bg rounded-2xl p-8 border border-white/5 text-center">
                        <label class="block text-sm font-medium text-brand-muted mb-4">Rate your overall experience</label>
                        
                        <div class="flex items-center justify-center gap-2" id="star-rating">
                            <input type="hidden" name="rating" id="rating-value" value="5" required>
                            {% for i in range(1, 6) %}
                            <button type="button" class="star-btn text-yellow-400 text-4xl focus:outline-none transition-transform" data-value="{{ i }}">
                                <i class="fa-solid fa-star drop-shadow-[0_0_15px_rgba(250,204,21,0.4)]"></i>
                            </button>
                            {% endfor %}
                        </div>
                    </div>
                    
                    <!-- Comments -->
                    <div>
                        <label for="comment" class="block text-sm font-medium text-brand-muted mb-2">Share your thoughts (Optional)</label>
                        <textarea id="comment" name="comment" rows="5" placeholder="What did you love? What could be improved?" class="w-full bg-brand-bg border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-transparent transition-all resize-none"></textarea>
                    </div>
                    
                    <div class="pt-4 flex items-center justify-end gap-4">
                        <a href="{{ url_for('events.detail', event_id=event.id) }}" class="px-6 py-3 rounded-xl font-medium text-white hover:bg-white/10 transition-colors">
                            Skip
                        </a>
                        <button type="submit" class="px-8 py-3 rounded-xl font-bold text-white bg-brand-accent hover:bg-indigo-500 shadow-lg shadow-brand-accent/20 hover:-translate-y-0.5 transition-all">
                            Submit Feedback
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const stars = document.querySelectorAll('.star-btn');
        const ratingInput = document.getElementById('rating-value');
        
        stars.forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.getAttribute('data-value'));
                ratingInput.value = value;
                
                stars.forEach(s => {
                    const sValue = parseInt(s.getAttribute('data-value'));
                    const icon = s.querySelector('i');
                    if (sValue <= value) {
                        icon.classList.remove('fa-regular', 'text-white/20');
                        icon.classList.add('fa-solid', 'text-yellow-400', 'drop-shadow-[0_0_15px_rgba(250,204,21,0.4)]');
                    } else {
                        icon.classList.remove('fa-solid', 'text-yellow-400', 'drop-shadow-[0_0_15px_rgba(250,204,21,0.4)]');
                        icon.classList.add('fa-solid', 'text-white/10');
                    }
                });
            });
            
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.getAttribute('data-value'));
                stars.forEach(s => {
                    const sValue = parseInt(s.getAttribute('data-value'));
                    if (sValue <= value) {
                        s.style.transform = 'scale(1.15)';
                    }
                });
            });
            
            star.addEventListener('mouseleave', function() {
                stars.forEach(s => {
                    s.style.transform = 'scale(1)';
                });
            });
        });
    });
</script>
{% endblock %}
